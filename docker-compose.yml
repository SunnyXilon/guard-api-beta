services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: rtcm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  inference:
    build:
      context: .
      dockerfile: Dockerfile.inference
    environment:
      RTCM_ENVIRONMENT: production
    ports:
      - "8001:8001"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - .env.example
    environment:
      RTCM_DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/rtcm
      RTCM_INFERENCE_SERVICE_URL: http://inference:8001
    depends_on:
      - db
      - inference
    ports:
      - "8000:8000"

volumes:
  postgres_data:
