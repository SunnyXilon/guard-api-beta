services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: guard_api
      POSTGRES_USER: guard_api
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    secrets:
      - postgres_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guard_api -d guard_api"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    restart: unless-stopped

  inference:
    build:
      context: .
      dockerfile: Dockerfile.inference
    environment:
      RTCM_ENVIRONMENT: production
      RTCM_ENABLE_HF_MODEL: "true"
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      inference:
        condition: service_started
    ports:
      - "8000:8000"
    secrets:
      - source: google_vision_service_account
        target: google-vision-service-account.json
    restart: unless-stopped

secrets:
  postgres_password:
    file: ./secrets/postgres-password.txt
  google_vision_service_account:
    file: ./secrets/google-vision-service-account.json

volumes:
  postgres_data:
  redis_data:
